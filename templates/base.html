<!doctype html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Agenda Financeira{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="dark-mode">


<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('landing') }}">Início</a>

        <div>
            {% if session.get("user_id") %}
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="{{ url_for('historico') }}" class="btn btn-outline-light me-2">Histórico</a>
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Sair</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-outline-light me-2">Entrar</a>
                <a href="{{ url_for('register') }}" class="btn btn-primary">Criar Conta</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
