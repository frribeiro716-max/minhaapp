{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<!-- FUNDO DO DASHBOARD -->
<div class="dashboard-bg"></div>

<h1 class="mb-4">Dashboard Financeiro</h1>

<!-- BOTÕES ALINHADOS -->
<div class="dashboard-buttons mb-4">
    <a href="{{ url_for('historico') }}" class="btn btn-secondary">Histórico</a>
    <a href="{{ url_for('fechar_mes') }}" class="btn btn-warning">Fechar Mês</a>
    <a href="{{ url_for('exportar_pdf') }}" class="btn btn-danger">Exportar PDF</a>
    
</div>

<!-- FORMULÁRIO DE DESPESAS -->
<div class="card p-3 mb-4">
    <h4>Adicionar Despesa</h4>
<form method="POST" action="{{ url_for('dashboard') }}" enctype="multipart/form-data">
    <input type="hidden" name="tipo_form" value="despesa">

    <div class="mb-3">
        <label>Fotografia da Fatura</label>
        <input type="file" name="fatura" accept="image/*" class="form-control">
    </div>

    <div class="mb-3">
        <label>Descrição</label>
        <input type="text" name="descricao" class="form-control">
    </div>

    <div class="mb-3">
        <label>Valor (€)</label>
        <input type="number" step="0.01" name="valor" class="form-control">
    </div>

    <div class="mb-3">
        <label>Data</label>
        <input type="date" name="data" class="form-control">
    </div>

    <button class="btn btn-primary">Adicionar</button>
</form>

</div>

<!-- FORMULÁRIO DE APORTES -->
<div class="card p-3 mb-4">
    <h4>Adicionar Aporte</h4>
    <form method="POST" action="{{ url_for('dashboard') }}">
        <input type="hidden" name="tipo_form" value="investimento">

        <div class="mb-3">
            <label>Valor (€)</label>
            <input type="number" step="0.01" name="investimento" class="form-control" required>
        </div>

        <button class="btn btn-success">Adicionar</button>
    </form>
</div>

<!-- GRÁFICOS -->
<div class="row">
    <div class="col-md-6">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="col-md-6">
        <canvas id="barChart"></canvas>
    </div>
</div>

<div class="mt-4">
    <canvas id="lineChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // PIE
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: {{ categorias|tojson }},
            datasets: [{
                data: {{ valores_categoria|tojson }},
                backgroundColor: ['#0d6efd','#6610f2','#198754','#dc3545','#fd7e14','#20c997']
            }]
        }
    });

    // BAR (CORRIGIDO)
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: {{ labels_combinado|tojson }},
            datasets: [
                {
                    label: 'Despesas',
                    data: {{ despesas_mes|tojson }},
                    backgroundColor: '#dc3545'
                },
                {
                    label: 'Aportes',
                    data: {{ aportes_mes|tojson }},
                    backgroundColor: '#198754'
                }
            ]
        }
    });

    // LINE
    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: {{ labels_combinado|tojson }},
            datasets: [{
                label: 'Saldo Mensal',
                data: {{ saldo_mes|tojson }},
                borderColor: '#0d6efd',
                fill: false
            }]
        }
    });
</script>

{% endblock %}
