<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #f2f2f2;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<h1>Relatório Financeiro</h1>

<table>
    <tr>
        <th>Descrição</th>
        <th>Valor (€)</th>
        <th>Data</th>
        <th>Mês Referente</th>
    </tr>

    {% for item in historico %}
    <tr>
        <td>{{ item.descricao }}</td>
        <td>{{ item.valor }}</td>
        <td>{{ item.data }}</td>
        <td>{{ item.mes_referente }}</td>
    </tr>
    {% endfor %}
</table>

<div class="footer">
    Gerado automaticamente pela Agenda Financeira
</div>

</body>
</html>
